<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kickchee Pro | Interface Dynamique</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #e67e22;
            --primary-light: #ff9d47;
            --dark: #0f172a;
            --success: #22c55e;
            --warning: #f59e0b;
            --info: #3b82f6;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.1);
            --shadow-sm: 0 4px 6px -1px rgba(0,0,0,0.1);
            --shadow-md: 0 10px 30px rgba(0,0,0,0.08);
            --shadow-lg: 0 20px 40px rgba(0,0,0,0.12);
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family:'Plus Jakarta Sans', sans-serif; }
        body { background: #f8fafc; color: var(--dark); overflow-x: hidden; scroll-behavior: smooth; }
        .hidden { display: none !important; }

        /* --- AUTHENTIFICATION --- */
        .portal { 
            height: 100vh; display: flex; align-items: center; justify-content: center; 
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); 
        }
        .glass-container { 
            background: var(--glass); backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 40px; 
            padding: 50px; width: 90%; max-width: 480px; text-align: center; color: white;
            box-shadow: var(--shadow-lg);
        }

        .grid-roles { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .role-item { 
            background: rgba(255,255,255,0.05); padding: 25px; border-radius: 24px; 
            cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border: 1px solid rgba(255,255,255,0.1); 
        }
        .role-item:hover { 
            background: var(--primary); transform: translateY(-10px); 
            box-shadow: 0 15px 30px rgba(230, 126, 34, 0.4);
            border-color: transparent;
        }
        .role-item i { font-size: 2rem; margin-bottom: 15px; display: block; }

        /* --- NAVIGATION --- */
        .nav-glass { 
            position: sticky; top:0; background: rgba(255,255,255,0.85); 
            backdrop-filter: blur(12px); padding: 12px 5%; z-index: 1000; 
            border-bottom: 1px solid rgba(0,0,0,0.05);
            transition: all 0.3s;
        }
        .nav-content { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 800; font-size: 1.5rem; letter-spacing: -0.5px; }
        .logo span { color: var(--primary); }

        /* --- INTERFACES --- */
        .interface { padding: 30px 5%; max-width: 1300px; margin: 0 auto; animation: slideUp 0.6s ease-out; }
        .card { 
            background: white; padding: 25px; border-radius: 28px; 
            box-shadow: var(--shadow-md); margin-bottom: 25px; 
            border: 1px solid rgba(0,0,0,0.02);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* --- PLATS DYNAMIQUES --- */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 25px; }
        .dish-card { overflow: hidden; position: relative; }
        .dish-card:hover { transform: translateY(-8px); box-shadow: var(--shadow-lg); }
        
        .dish-img-container { width: 100%; height: 200px; overflow: hidden; border-radius: 20px; margin-bottom: 15px; }
        .dish-img { 
            width: 100%; height: 100%; object-fit: cover; 
            transition: transform 0.6s cubic-bezier(0.2, 0, 0.2, 1);
        }
        .dish-card:hover .dish-img { transform: scale(1.1); }

        /* --- PANIER ANIMÉ --- */
        #cart-bar {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--dark); color: white; padding: 18px 35px; border-radius: 100px;
            display: flex; gap: 25px; align-items: center; box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            z-index: 2000; cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #cart-bar:hover { transform: translateX(-50%) scale(1.05); padding: 18px 45px; }
        .bump { animation: bumpAnim 0.4s ease-out; }

        /* --- STATUTS ET BADGES --- */
        .badge-status { 
            padding: 6px 14px; border-radius: 10px; font-size: 0.75rem; 
            font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .s-1 { background: #fef3c7; color: #d97706; } /* Attente */
        .s-2 { background: #dbeafe; color: #2563eb; } /* Cuisine */
        .s-3 { background: #f3e8ff; color: #9333ea; } /* Route */
        .s-4 { background: #dcfce7; color: #16a34a; } /* Livré */

        /* --- STEPPER MODERNE --- */
        .stepper { display: flex; justify-content: space-between; position: relative; margin: 35px 0 15px; }
        .stepper::before { content: ""; position: absolute; top: 50%; left: 0; right: 0; height: 3px; background: #f1f5f9; transform: translateY(-50%); z-index: 0; }
        .step { 
            width: 38px; height: 38px; border-radius: 50%; background: white; 
            border: 3px solid #f1f5f9; z-index: 1; display: flex; align-items: center; 
            justify-content: center; position: relative; transition: 0.4s;
        }
        .step.active { border-color: var(--primary); color: var(--primary); box-shadow: 0 0 15px rgba(230, 126, 34, 0.3); }
        .step.done { border-color: var(--success); background: var(--success); color: white; }
        .step-label { position: absolute; top: 45px; font-size: 0.65rem; font-weight: 800; color: #94a3b8; white-space: nowrap; }

        /* --- BOUTONS --- */
        .btn-primary { 
            width: 100%; background: var(--primary); color: white; border: none; 
            padding: 14px; border-radius: 16px; font-weight: 700; cursor: pointer; 
            transition: 0.3s; box-shadow: 0 4px 12px rgba(230, 126, 34, 0.2);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(230, 126, 34, 0.3); background: var(--primary-light); }
        .btn-primary:active { transform: scale(0.96); }

        /* --- ANIMATIONS --- */
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bumpAnim { 0% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.12); } 100% { transform: translateX(-50%) scale(1); } }
        
        /* Mobile adjustment */
        @media (max-width: 600px) {
            .grid-roles { grid-template-columns: 1fr; }
            .interface { padding: 20px 15px; }
            #cart-bar { width: 90%; justify-content: center; }
        }
    </style>
</head>
<body>

    <div id="auth-portal" class="portal">
        <div class="glass-container">
            <h1 style="font-size: 2.5rem; font-weight: 900; margin-bottom: 10px;">KICK<span>CHEE</span></h1>
            <p style="opacity: 0.8; font-weight: 500;">Expérience Livraison Zanguera</p>
            
            <div id="role-selection" class="grid-roles">
                <div class="role-item" onclick="prepareLogin('client')"><i class="fa-solid fa-pizza-slice"></i><span>Client</span></div>
                <div class="role-item" onclick="prepareLogin('vendeur')"><i class="fa-solid fa-store"></i><span>Vendeur</span></div>
                <div class="role-item" onclick="prepareLogin('livreur')"><i class="fa-solid fa-moped"></i><span>Livreur</span></div>
                <div class="role-item" onclick="prepareLogin('admin')"><i class="fa-solid fa-fingerprint"></i><span>Admin</span></div>
            </div>

            <form id="auth-form" class="hidden" onsubmit="handleFinalAuth(event)" style="margin-top: 30px;">
                <h3 id="role-title" style="margin-bottom:25px; font-weight: 800;">Accès Premium</h3>
                <input type="text" id="user-name" placeholder="Nom d'utilisateur" required style="width:100%; padding:15px; margin-bottom:12px; border-radius:15px; border:none; background: rgba(255,255,255,0.15); color: white; outline: none;">
                <input type="password" id="user-pass" placeholder="Mot de passe" required style="width:100%; padding:15px; margin-bottom:20px; border-radius:15px; border:none; background: rgba(255,255,255,0.15); color: white; outline: none;">
                <button type="submit" class="btn-primary">Lancer la session</button>
            </form>
        </div>
    </div>

    <nav id="app-nav" class="hidden nav-glass">
        <div class="nav-content">
            <div class="logo">KICK<span>CHEE</span></div>
            <div style="display:flex; align-items:center; gap:12px;">
                <div id="nav-user-info" style="font-size: 0.85rem; font-weight: 700; background: #f1f5f9; padding: 6px 12px; border-radius: 10px;"></div>
                <button onclick="logout()" style="border:none; background: #fee2e2; color:#ef4444; width:35px; height:35px; border-radius:10px; cursor:pointer; transition: 0.3s;"><i class="fa-solid fa-power-off"></i></button>
            </div>
        </div>
    </nav>

    <div id="toast-container" style="position:fixed; top:25px; right:25px; z-index:9999; pointer-events: none;"></div>

    <main id="app-content" class="hidden">
        
        <section id="view-client" class="interface hidden">
            <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:30px;">
                <div>
                    <h2 style="font-size: 1.8rem; font-weight: 900;">Nos spécialités</h2>
                    <p style="color: #64748b;">Sélectionnez vos plats favoris</p>
                </div>
            </div>
            
            <div class="product-grid" id="client-dishes"></div>
            
            <div id="client-orders-section" style="margin-top:50px;">
                <h3 style="margin-bottom: 20px;"><i class="fa-solid fa-spinner fa-spin" style="color:var(--primary); margin-right:10px;"></i> Suivi de vos commandes</h3>
                <div id="client-active-orders"></div>
            </div>

            <div id="cart-bar" class="hidden" onclick="checkout()">
                <div style="background: var(--primary); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                    <i class="fa-solid fa-bag-shopping" style="font-size: 1.1rem;"></i>
                </div>
                <div style="display:flex; flex-direction: column;">
                    <span id="cart-count" style="font-size: 0.75rem; opacity: 0.7; font-weight: 600;">0 articles</span>
                    <span id="cart-total" style="font-weight:800; font-size: 1.1rem;">0 FCFA</span>
                </div>
                <div style="margin-left: auto; font-weight: 800; font-size: 0.8rem; background: rgba(255,255,255,0.1); padding: 8px 15px; border-radius: 12px;">COMMANDER <i class="fa-solid fa-arrow-right" style="margin-left: 5px;"></i></div>
            </div>
        </section>

        <section id="view-vendeur" class="interface hidden">
            <div class="card" style="border-top: 5px solid var(--primary);">
                <h3><i class="fa-solid fa-inbox" style="color:var(--primary); margin-right:10px;"></i> Nouvelles commandes</h3>
                <div id="vendeur-new-orders" style="margin-top:20px;"></div>
            </div>
            <div class="card">
                <h3><i class="fa-solid fa-route" style="color:var(--info); margin-right:10px;"></i> Livraisons en cours</h3>
                <div id="vendeur-tracking-list" style="margin-top:20px;"></div>
            </div>
        </section>

        <section id="view-livreur" class="interface hidden">
            <h2 style="margin-bottom:25px;">Bonjour, Livreur</h2>
            <div id="livreur-tasks"></div>
        </section>

        <section id="view-admin" class="interface hidden">
            <div class="product-grid">
                <div class="card">
                    <h4>Ajouter au Menu</h4>
                    <input type="text" id="adm-dish-name" placeholder="Nom du plat" style="width:100%; padding:12px; margin:12px 0; border:1.5px solid #f1f5f9; border-radius:12px;">
                    <input type="number" id="adm-dish-price" placeholder="Prix (FCFA)" style="width:100%; padding:12px; margin:12px 0; border:1.5px solid #f1f5f9; border-radius:12px;">
                    <input type="text" id="adm-dish-img" placeholder="Lien image Unsplash" style="width:100%; padding:12px; margin:12px 0; border:1.5px solid #f1f5f9; border-radius:12px;">
                    <button class="btn-primary" onclick="addDish()">Publier le plat</button>
                </div>
                <div class="card">
                    <h4>Nouveau Staff</h4>
                    <input type="text" id="adm-liv-name" placeholder="Nom du livreur" style="width:100%; padding:12px; margin:12px 0; border:1.5px solid #f1f5f9; border-radius:12px;">
                    <input type="password" id="adm-liv-pass" placeholder="Code secret" style="width:100%; padding:12px; margin:12px 0; border:1.5px solid #f1f5f9; border-radius:12px;">
                    <button class="btn-primary" style="background: var(--dark);" onclick="addLivreur()">Enregistrer staff</button>
                </div>
            </div>
        </section>
    </main>

    <script>
        // --- DATA ENGINE ---
        let state = {
            user: JSON.parse(localStorage.getItem('kc_session')),
            inventory: JSON.parse(localStorage.getItem('kc_plats')) || [
                { id: 1, name: "Atchéké au Poisson", price: 2500, img: "https://images.unsplash.com/photo-1567620905732-2d1ec7bb7445?auto=format&fit=crop&w=500" },
                { id: 2, name: "Riz Cantonais Spécial", price: 3500, img: "https://images.unsplash.com/photo-1512058560366-c80b0426c6f4?auto=format&fit=crop&w=500" },
                { id: 3, name: "Poulet Braisé Zanguera", price: 4500, img: "https://images.unsplash.com/photo-1598515214211-89d3c73ae83b?auto=format&fit=crop&w=500" }
            ],
            livreurs: JSON.parse(localStorage.getItem('kc_staff')) || [{ name: "Sami", pass: "1234" }],
            orders: JSON.parse(localStorage.getItem('kc_commandes')) || [],
            cart: []
        };

        const save = () => {
            localStorage.setItem('kc_plats', JSON.stringify(state.inventory));
            localStorage.setItem('kc_staff', JSON.stringify(state.livreurs));
            localStorage.setItem('kc_commandes', JSON.stringify(state.orders));
        };

        // --- AUTH ---
        function prepareLogin(role) {
            state.tempRole = role;
            document.getElementById('role-selection').style.display = 'none';
            document.getElementById('auth-form').classList.remove('hidden');
            document.getElementById('role-title').innerText = `Connexion ${role.toUpperCase()}`;
        }

        function handleFinalAuth(e) {
            e.preventDefault();
            const name = document.getElementById('user-name').value;
            state.user = { name, role: state.tempRole };
            localStorage.setItem('kc_session', JSON.stringify(state.user));
            location.reload();
        }

        function logout() { localStorage.removeItem('kc_session'); location.reload(); }

        // --- ADMIN ---
        function addDish() {
            const n = document.getElementById('adm-dish-name').value;
            const p = document.getElementById('adm-dish-price').value;
            const i = document.getElementById('adm-dish-img').value || "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=500";
            if(!n || !p) return toast("Formulaire incomplet", "error");
            state.inventory.push({ id: Date.now(), name: n, price: parseInt(p), img: i });
            save(); toast("Plat ajouté au menu !"); location.reload();
        }

        function addLivreur() {
            const n = document.getElementById('adm-liv-name').value;
            const p = document.getElementById('adm-liv-pass').value;
            if(!n || !p) return toast("Identifiants requis", "error");
            state.livreurs.push({ name: n, pass: p });
            save(); toast("Nouveau livreur prêt !"); location.reload();
        }

        // --- CLIENT ---
        function addToCart(dishId) {
            const dish = state.inventory.find(d => d.id === dishId);
            state.cart.push(dish);
            updateCartUI();
            toast(`Ajouté : ${dish.name}`);
        }

        function updateCartUI() {
            const bar = document.getElementById('cart-bar');
            if(state.cart.length > 0) {
                bar.classList.remove('hidden');
                bar.classList.add('bump');
                setTimeout(() => bar.classList.remove('bump'), 400);
                
                document.getElementById('cart-count').innerText = `${state.cart.length} plat(s)`;
                const total = state.cart.reduce((sum, item) => sum + item.price, 0);
                document.getElementById('cart-total').innerText = `${total} FCFA`;
            } else {
                bar.classList.add('hidden');
            }
        }

        function checkout() {
            const total = state.cart.reduce((sum, item) => sum + item.price, 0);
            const newOrder = {
                id: Math.floor(1000 + Math.random() * 9000),
                client: state.user.name,
                items: [...state.cart],
                total: total,
                status: 1, // 1:Attente, 2:Cuisine, 3:Route, 4:Livré
                livreur: null,
                date: new Date().toLocaleTimeString()
            };
            state.orders.push(newOrder);
            state.cart = [];
            save();
            updateCartUI();
            toast("🚀 Commande envoyée avec succès !");
            renderClient();
        }

        function renderClient() {
            const grid = document.getElementById('client-dishes');
            grid.innerHTML = state.inventory.map((d, index) => `
                <div class="card dish-card" style="animation-delay: ${index * 0.1}s">
                    <div class="dish-img-container">
                        <img src="${d.img}" class="dish-img">
                    </div>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                        <strong style="font-size:1.1rem;">${d.name}</strong>
                        <span style="color:var(--primary); font-weight:900; font-size:1.2rem;">${d.price} <small style="font-size:0.6rem;">FCFA</small></span>
                    </div>
                    <button class="btn-primary" onclick="addToCart(${d.id})"><i class="fa-solid fa-plus" style="margin-right:8px;"></i> Ajouter au panier</button>
                </div>
            `).join('');

            const activeCont = document.getElementById('client-active-orders');
            const myOrders = state.orders.filter(o => o.client === state.user.name && o.status < 4);
            activeCont.innerHTML = myOrders.map(o => `
                <div class="card">
                    <div style="display:flex; justify-content:space-between; margin-bottom:15px; align-items:center;">
                        <strong>Commande #${o.id}</strong>
                        <span class="badge-status s-${o.status}">${o.status === 1 ? 'En attente' : o.status === 2 ? 'En cuisine' : 'En chemin'}</span>
                    </div>
                    <div class="stepper">
                        <div class="step ${o.status>=1?'active':''} ${o.status>1?'done':''}"><i class="fa-solid fa-clock"></i><span class="step-label">Attente</span></div>
                        <div class="step ${o.status>=2?'active':''} ${o.status>2?'done':''}"><i class="fa-solid fa-fire"></i><span class="step-label">Cuisine</span></div>
                        <div class="step ${o.status>=3?'active':''} ${o.status>3?'done':''}"><i class="fa-solid fa-motorcycle"></i><span class="step-label">Route</span></div>
                        <div class="step ${o.status>=4?'done':''}"><i class="fa-solid fa-check-double"></i><span class="step-label">Livré</span></div>
                    </div>
                </div>
            `).join('') || "<p style='opacity:0.5; text-align:center; padding:20px;'>Vous n'avez aucune commande active.</p>";
        }

        // --- VENDEUR ---
        function renderVendeur() {
            const news = state.orders.filter(o => o.status === 1);
            document.getElementById('vendeur-new-orders').innerHTML = news.map(o => `
                <div class="card" style="background:#fffaf5; border:1px solid #ffe8d6;">
                    <div style="display:flex; justify-content:space-between;">
                        <p><strong>#${o.id}</strong> - Client: <b>${o.client}</b></p>
                        <span style="font-weight:800; color:var(--primary)">${o.total} FCFA</span>
                    </div>
                    <p style="font-size:0.85rem; color:#64748b; margin:10px 0;">Contenu: ${o.items.map(i => i.name).join(', ')}</p>
                    <div style="display:flex; gap:12px; margin-top:15px;">
                        <select id="sel-${o.id}" style="flex:1; padding:12px; border-radius:12px; border:1.5px solid #f1f5f9; outline:none; font-weight:700;">
                            ${state.livreurs.map(l => `<option value="${l.name}">${l.name}</option>`).join('')}
                        </select>
                        <button class="btn-primary" style="width:auto; padding:0 25px;" onclick="assignOrder(${o.id})">Valider</button>
                    </div>
                </div>
            `).join('') || "File d'attente vide.";

            const actives = state.orders.filter(o => o.status > 1 && o.status < 4);
            document.getElementById('vendeur-tracking-list').innerHTML = actives.map(o => `
                <div class="card" style="display:flex; justify-content:space-between; align-items:center; padding:15px 25px;">
                    <div>
                        <strong style="display:block;">#${o.id}</strong>
                        <small style="color:var(--info); font-weight:800;">Livreur: ${o.livreur}</small>
                    </div>
                    <span class="badge-status s-${o.status}">${o.status === 2 ? 'Cuisine' : 'Livraison'}</span>
                </div>
            `).join('') || "Aucune livraison active.";
        }

        function assignOrder(id) {
            const liv = document.getElementById(`sel-${id}`).value;
            const order = state.orders.find(o => o.id === id);
            order.status = 2;
            order.livreur = liv;
            save(); toast(`Assigné à ${liv}`); renderVendeur();
        }

        // --- LIVREUR ---
        function renderLivreur() {
            const myTasks = state.orders.filter(o => o.livreur === state.user.name && o.status < 4);
            document.getElementById('livreur-tasks').innerHTML = myTasks.map(o => `
                <div class="card">
                    <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                        <h4>Commande #${o.id}</h4>
                        <span style="font-weight:900; background:#f1f5f9; padding:5px 12px; border-radius:8px;">${o.total} FCFA</span>
                    </div>
                    <p style="color:#64748b; margin-bottom:15px;"><i class="fa-solid fa-location-dot"></i> Destination: <b>${o.client}</b></p>
                    <button class="btn-primary" style="background:${o.status===2? 'var(--dark)' : 'var(--success)'}" onclick="updateStatus(${o.id})">
                        ${o.status === 2 ? 'Récupérer le colis' : 'Terminer la livraison'}
                    </button>
                </div>
            `).join('') || "Recherche de nouvelles courses...";
        }

        function updateStatus(id) {
            const order = state.orders.find(o => o.id === id);
            order.status += 1;
            save();
            toast("Mise à jour effectuée");
            renderLivreur();
        }

        // --- UTILS ---
        function toast(m) {
            const t = document.createElement('div');
            t.style = "background: white; color: var(--dark); padding: 15px 25px; border-radius: 18px; margin-bottom: 12px; box-shadow: var(--shadow-lg); border-left: 5px solid var(--primary); display: flex; align-items: center; gap: 12px; font-weight: 700; animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;";
            t.innerHTML = `<i class="fa-solid fa-circle-check" style="color:var(--success);"></i> ${m}`;
            document.getElementById('toast-container').appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateX(50px)'; setTimeout(() => t.remove(), 400); }, 3000);
        }

        window.onload = () => {
            if(state.user) {
                document.getElementById('auth-portal').classList.add('hidden');
                document.getElementById('app-nav').classList.remove('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                document.getElementById('nav-user-info').innerText = `${state.user.name} | ${state.user.role.toUpperCase()}`;
                document.getElementById(`view-${state.user.role}`).classList.remove('hidden');
                
                setInterval(() => {
                    state.orders = JSON.parse(localStorage.getItem('kc_commandes')) || [];
                    if(state.user.role === 'client') renderClient();
                    if(state.user.role === 'vendeur') renderVendeur();
                    if(state.user.role === 'livreur') renderLivreur();
                }, 3000);

                if(state.user.role === 'client') renderClient();
                if(state.user.role === 'vendeur') renderVendeur();
                if(state.user.role === 'livreur') renderLivreur();
            }
        };
    </script>
</body>
</html>
